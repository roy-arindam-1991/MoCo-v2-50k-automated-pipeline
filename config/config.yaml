# ============================================================
# DEEPCTSEG MoCo v2 Pipeline — Configuration
# All hyperparameters as reported in the manuscript.
# ============================================================

# ----- Paths ------------------------------------------------
paths:
  raw_tiff_dir:    "data/raw/"          # root directory of per-specimen TIFF stacks
  hdf5_dir:        "data/hdf5/"         # output directory for converted HDF5 files
  mask_dir:        "data/masks/"        # rule-based coarse masks
  mocov2_ckpt_dir: "checkpoints/mocov2/"
  unet_ckpt_dir:   "checkpoints/unet/"
  mesh_output_dir: "outputs/meshes/"
  log_dir:         "logs/"

# ----- Data partitions (number of specimens) ----------------
partitions:
  mocov2_train:      19    # 39,037 images  — MoCo v2 contrastive pre-training
  mocov2_val:         2    # 3,765 images   — MoCo v2 checkpoint selection
  unet_train:         2    # used with rule-based masks for U-Net training
  unet_test:          1    # held-out internal test specimen
  # Total corpus: 50,626 images across 24 specimens

# ----- Preprocessing ----------------------------------------
preprocessing:
  image_size: [224, 224]   # px — all slices resized to this resolution
  norm_min: 0.0
  norm_max: 1.0
  z_mean: 0.5              # z-standardisation μ
  z_std:  0.5              # z-standardisation σ
  hdf5_chunk_size: [1, 224, 224]
  compression: "gzip"
  compression_opts: 4

# ----- MoCo v2 Pre-training ----------------------------------
mocov2:
  encoder: "resnet50"          # ResNet-50 backbone (He et al., 2016)
  projection_dim: 128          # projection head output dimension
  queue_size: 8192             # K — number of negative samples in queue
  momentum: 0.999              # m — key encoder EMA coefficient
  temperature: 0.07            # T — InfoNCE softmax temperature
  mlp: true                    # enable 2-layer MLP projection head (MoCo v2)
  epochs: 600
  batch_size: 128
  learning_rate: 0.015         # linear scaling: 0.015 × batch/256
  weight_decay: 1.0e-4
  optimizer: "sgd"
  scheduler: "cosine_annealing"
  num_workers: 10
  seed: 42

  # Domain-specific augmentation pipeline (positive pair generation)
  augmentations:
    random_resized_crop:
      scale: [0.2, 1.0]
    vertical_flip:
      p: 0.5
    horizontal_flip:
      p: 0.5
    random_rotation:
      degrees: 180
    gaussian_blur:
      kernel_size: 5
      sigma: [0.5, 3.0]
      p: 0.6

# ----- Rule-Based Masking ------------------------------------
masking:
  # Stage 1: intensity normalisation
  percentile_low: 2
  percentile_high: 98

  # Stage 2: blurring
  gaussian_sigma: 1.5
  median_kernel_size: 3

  # Stage 3: Otsu thresholding + region expansion
  otsu_nbins: 256
  dilation_radius: 3

  # Stage 4: morphological refinement
  tophat_kernel_size: 15
  erosion_iterations: 1
  dilation_iterations: 2

  # Stage 5: connected component filtering
  min_area_mm2: 0.5

# ----- U-Net Training ----------------------------------------
unet:
  encoder: "resnet50"          # initialised from MoCo v2 checkpoint
  loss: "bce_with_logits"      # BCEWithLogitsLoss
  epochs: 500
  batch_size: 16
  learning_rate: 1.0e-4
  optimizer: "adam"
  scheduler: "cosine"
  num_workers: 16
  hu_window_min: -500
  hu_window_max: 1300
  checkpoint_metric: "dice"

# ----- 3D Mesh Generation ------------------------------------
mesh:
  iso_level: 0.5
  step_size: 1
  region_grow_threshold: 0.4
  min_fragment_voxels: 50
  closing_radius: 2

# ----- Evaluation --------------------------------------------
evaluation:
  # Grad-CAM
  grad_cam_target_layer: "layer4"

  # UMAP
  umap_n_neighbours: 30
  umap_min_dist: 0.1
  umap_n_components: 2
  umap_metric: "cosine"

  # CloudCompare registration
  icp_max_iterations: 100
  icp_convergence_threshold: 1.0e-6
  icp_overlap_default: 1.0
  icp_overlap_trimmed: 0.80
